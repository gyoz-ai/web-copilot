name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun turbo build --filter=@gyoz-ai/engine
      - run: bun turbo typecheck
      - run: bun turbo test

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun turbo build --filter=@gyoz-ai/engine
      - run: cd packages/extension && bunx wxt build
      - uses: actions/upload-artifact@v4
        with:
          name: extension-chrome
          path: packages/extension/.output/chrome-mv3/
      - run: cd packages/extension && bunx wxt build --browser firefox
      - uses: actions/upload-artifact@v4
        with:
          name: extension-firefox
          path: packages/extension/.output/firefox-mv3/
